<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>本地文档翻译</title>
  <link rel="stylesheet" href="document.css">
</head>
<body>
  <main>
    <header>
      <h1>本地文档翻译</h1>
      <p>支持 PDF、DOCX、TXT。文件在浏览器本地解析，逐段调用你的本地/远程大模型。</p>
    </header>
    <section id="drop-zone">
      <input id="file" type="file" accept=".pdf,.docx,.txt,.text,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain">
      <p>选择或拖入文档</p>
    </section>
    <section class="toolbar">
      <label>每段最大字符 <input id="max-chars" type="number" min="300" max="2400" value="900"></label>
      <button id="translate" class="primary" disabled>开始翻译</button>
      <button id="stop" disabled>停止</button>
      <button id="clear-context">清空模型上下文</button>
      <button id="download" disabled>下载译文 TXT</button>
    </section>
    <pre id="status">等待文档…</pre>
    <article id="preview"></article>
  </main>
  <script src="vendor/mammoth.browser.min.js"></script>
  <script type="module" src="document.js"></script>
</body>
</html>
